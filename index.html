<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Mark Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Mark Calculator</h2>

    <input type="number" id="m1" placeholder="Enter Subject 1 Marks"><br>
    <input type="number" id="m2" placeholder="Enter Subject 2 Marks"><br>
    <input type="number" id="m3" placeholder="Enter Subject 3 Marks"><br>

    <button onclick="calculateMarks()">Calculate</button>

    <div id="result"></div>
</div>

<script>
    function calculateMarks() {
        let m1 = parseFloat(document.getElementById("m1").value);
        let m2 = parseFloat(document.getElementById("m2").value);
        let m3 = parseFloat(document.getElementById("m3").value);

        if (isNaN(m1) || isNaN(m2) || isNaN(m3)) {
            document.getElementById("result").innerHTML = "Please enter all marks!";
            return;
        }

        let total = m1 + m2 + m3;
        let average = total / 3;

        document.getElementById("result").innerHTML =
            "Total = " + total + "<br>Average = " + average.toFixed(1);
    }
</script>

</body>
</html>
